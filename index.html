<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Tool Web</h1>
        </header>
        <main>
            <section class="tool-selector">
                <h2>选择AI Tool</h2>
                <div class="tool-grid">
                    <!-- 工具卡片将在这里动态生成 -->
                </div>
            </section>
            <section class="tool-details">
                <h2>工具详情</h2>
                <div id="tool-details-content">
                    <p>请选择一个AI工具查看详情</p>
                </div>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 AI Tool Web</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
